<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wireframe Cube Loader</title>
    <link rel="stylesheet" href="./style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="loader-canvas" aria-hidden="true"></canvas>

    <!-- Loading readout. Driven by the engine via window.SandscapeLoader (see loader-ui.js). -->
    <div id="loader-ui" role="status" aria-live="polite">
      <div id="loading-label">Loading</div>
      <div id="progress-box">
        <div id="progress-fill"></div>
      </div>
      <div id="progress-percent" aria-hidden="true">0%</div>
    </div>

    <script type="module" src="./main.js"></script>
    <script src="./loader-ui.js"></script>
  </body>
</html>
